apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      containers:
        - name: task-manager
          image: jinostrozach/task-manager:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: task-manager-config
            - secretRef:
                name: task-manager-secret
---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-service
  namespace: task-manager
spec:
  type: LoadBalancer
  selector:
    app: task-manager
  ports:
    - port: 8080
      targetPort: 8080